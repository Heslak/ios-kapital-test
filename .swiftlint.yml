# SwiftLint Configuration for KapitalTest
# Documentation: https://realm.github.io/SwiftLint/

# Enabled rules beyond the default set
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - convenience_type
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# Disabled rules
disabled_rules:
  - todo
  - trailing_whitespace
  - opening_brace
  - inclusive_language
  - nesting
  - file_header
  - sorted_imports
  - file_name
  - identifier_name
  - cyclomatic_complexity

# Paths to include in linting
included:
  - KapitalTest
  - KapitalTestTests
  - KapitalTestUITests
  - services
  - ui

# Paths to exclude from linting
excluded:
  - Pods
  - DerivedData
  - .build
  - vendor
  - "**/DevApp/**"
  - "**/*DevApp*/**"

# Rule configurations
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: false
  ignores_interpolated_strings: true

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 120

function_parameter_count:
  warning: 6
  error: 8

type_name:
  min_length:
    warning: 3
    error: 0
  max_length:
    warning: 50
    error: 60

large_tuple:
  warning: 3
  error: 4

reporter: "xcode"
